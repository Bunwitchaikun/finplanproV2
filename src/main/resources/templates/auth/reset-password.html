<!DOCTYPE html>
<html lang="th" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{public-layout :: layout(~{::title}, ~{::main})}">
<head><title>Reset Password — FinPlanPro</title></head>
<body>
<main>
    <div style="width:440px;max-width:96vw;background:#1a1d27;border-radius:18px;padding:2.5rem;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
        <div class="mb-4 text-center">
            <h3 style="color:#fff;font-weight:700;"><i class="bi bi-bank me-2" style="color:#7c6ff7;"></i>FinPlanPro</h3>
        </div>
        <h4 style="color:#fff;font-weight:700;margin-bottom:0.4rem;">Reset Password</h4>
        <p style="color:#aaa;font-size:0.88rem;margin-bottom:1.5rem;">กรอกรหัสผ่านใหม่ของคุณ</p>

        <div th:if="${errorMsg}" class="alert py-2 mb-3"
             style="background:rgba(220,53,69,0.15);border:1px solid rgba(220,53,69,0.3);color:#f88;border-radius:8px;">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
        </div>

        <form th:action="@{/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}">
            <div class="mb-3" style="position:relative;">
                <input type="password" id="password" name="password" required placeholder="New Password"
                       style="width:100%;padding:0.75rem 1rem;padding-right:2.8rem;background:#23263a;border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:#fff;font-size:0.95rem;outline:none;">
                <button type="button" id="togglePw1"
                        style="position:absolute;right:0.9rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#aaa;padding:0;">
                    <i class="bi bi-eye" id="eye1" style="font-size:1.1rem;"></i>
                </button>
            </div>
            <div class="mb-4" style="position:relative;">
                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm New Password"
                       style="width:100%;padding:0.75rem 1rem;padding-right:2.8rem;background:#23263a;border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:#fff;font-size:0.95rem;outline:none;">
                <button type="button" id="togglePw2"
                        style="position:absolute;right:0.9rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#aaa;padding:0;">
                    <i class="bi bi-eye" id="eye2" style="font-size:1.1rem;"></i>
                </button>
            </div>
            <button type="submit"
                    style="width:100%;padding:0.75rem;background:linear-gradient(90deg,#7c6ff7,#5e9de8);border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;">
                Reset Password
            </button>
        </form>

        <script>
            [['togglePw1','password','eye1'],['togglePw2','confirmPassword','eye2']].forEach(([btn,inp,icon]) => {
                document.getElementById(btn).addEventListener('click', function() {
                    const el = document.getElementById(inp);
                    const show = el.type === 'password';
                    el.type = show ? 'text' : 'password';
                    document.getElementById(icon).className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
                });
            });
        </script>
    </div>
</main>
</body>
</html>
