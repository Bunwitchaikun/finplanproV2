<!DOCTYPE html>
<html lang="th" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{public-layout :: layout(~{::title}, ~{::main})}">
<head><title>Forgot Password — FinPlanPro</title></head>
<body>
<main>
    <div style="width:440px;max-width:96vw;background:#1a1d27;border-radius:18px;padding:2.5rem;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
        <div class="mb-4 text-center">
            <h3 style="color:#fff;font-weight:700;"><i class="bi bi-bank me-2" style="color:#7c6ff7;"></i>FinPlanPro</h3>
        </div>
        <h4 style="color:#fff;font-weight:700;margin-bottom:0.4rem;">Forgot Password</h4>
        <p style="color:#aaa;font-size:0.88rem;margin-bottom:1.5rem;">กรอก email เพื่อรับลิงก์รีเซ็ตรหัสผ่าน</p>

        <div th:if="${successMsg}" class="alert py-2 mb-3"
             style="background:rgba(25,135,84,0.15);border:1px solid rgba(25,135,84,0.3);color:#6f6;border-radius:8px;">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        </div>
        <div th:if="${errorMsg}" class="alert py-2 mb-3"
             style="background:rgba(220,53,69,0.15);border:1px solid rgba(220,53,69,0.3);color:#f88;border-radius:8px;">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
        </div>

        <form th:action="@{/forgot-password}" method="post">
            <div class="mb-3">
                <input type="email" name="email" required autofocus placeholder="Email address"
                       style="width:100%;padding:0.75rem 1rem;background:#23263a;border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:#fff;font-size:0.95rem;outline:none;">
            </div>
            <button type="submit"
                    style="width:100%;padding:0.75rem;background:linear-gradient(90deg,#7c6ff7,#5e9de8);border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;">
                Send Reset Link
            </button>
        </form>
        <p class="text-center mt-3" style="font-size:0.88rem;">
            <a th:href="@{/login}" style="color:#7c6ff7;text-decoration:none;">← Back to Login</a>
        </p>
    </div>
</main>
</body>
</html>
