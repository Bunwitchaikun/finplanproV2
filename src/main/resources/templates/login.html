<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{public-layout :: layout(~{::title}, ~{::main})}">

<head>
    <title>Login to FinPlanPro</title>
</head>

<body>
<main role="main">
    <div class="auth-card-modern">
        <!-- Left Side: Image -->
        <div class="auth-image-side">
            <div class="auth-image-overlay"></div>
            <div class="auth-image-content">
                <div>
                    <h3 class="fw-bold"><i class="bi bi-bank me-2"></i>FinPlanPro</h3>
                </div>
                <div>
                    <h2 class="mb-3">Plan Your Future,<br>Secure Your Freedom</h2>
                    <div class="d-flex gap-2 mt-3">
                        <div style="width: 24px; height: 4px; background: white; border-radius: 2px;"></div>
                        <div
                                style="width: 8px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px;">
                        </div>
                        <div
                                style="width: 8px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px;">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side: Form -->
        <div class="auth-form-side">
            <h2 class="auth-title">Welcome back</h2>
            <p class="auth-subtitle">Don't have an account? <a th:href="@{/register}" class="auth-link">Register</a>
            </p>

            <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> Invalid username or password.
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i> You have been logged out.
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <input type="text" class="auth-input" id="username" name="username" required autofocus
                           placeholder="Username or Email">
                </div>
                <div class="mb-3" style="position:relative;">
                    <input type="password" class="auth-input" id="password" name="password" required
                           placeholder="Password" style="padding-right:2.8rem;">
                    <button type="button" id="togglePassword"
                            style="position:absolute;right:0.9rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#aaa;padding:0;">
                        <i class="bi bi-eye" id="eyeIcon" style="font-size:1.1rem;"></i>
                    </button>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check mb-0">
                        <input class="form-check-input form-check-input-custom" type="checkbox" id="rememberMe"
                               name="remember-me">
                        <label class="form-check-label text-secondary" for="rememberMe">
                            Remember me
                        </label>
                    </div>
                    <a th:href="@{/forgot-password}" class="auth-link" style="font-size:0.88rem;">Forgot password?</a>
                </div>

                <button type="submit" class="auth-btn">Login</button>
            </form>

            <div class="d-flex align-items-center my-3">
                <hr style="flex:1; border-color:rgba(255,255,255,0.15);">
                <span style="padding:0 0.75rem; color:#aaa; font-size:0.85rem;">or</span>
                <hr style="flex:1; border-color:rgba(255,255,255,0.15);">
            </div>

            <a href="/oauth2/authorization/google"
               style="display:flex;align-items:center;justify-content:center;gap:0.6rem;width:100%;padding:0.7rem;border:1px solid rgba(255,255,255,0.2);border-radius:10px;background:rgba(255,255,255,0.05);color:#fff;text-decoration:none;font-size:0.95rem;font-weight:500;transition:background 0.2s;">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    <path fill="none" d="M0 0h48v48H0z"/>
                </svg>
                Continue with Google
            </a>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', function () {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                eyeIcon.className = isPassword ? 'bi bi-eye-slash' : 'bi bi-eye';
            });
        }
    </script>
</main>
</body>

</html>
