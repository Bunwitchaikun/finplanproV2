<!DOCTYPE html>
<html th:fragment="layout(title, content)" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:replace="${title}">FinPlanPro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #0f1117; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
        .navbar-dark-custom { background: #1a1d27; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .nav-link { color: rgba(255,255,255,0.7) !important; }
        .nav-link:hover { color: #fff !important; }
        .navbar-brand { color: #fff !important; font-weight: 700; }
        .card { background: #1a1d27; border: 1px solid rgba(255,255,255,0.08); color: #e0e0e0; }
        .table { color: #e0e0e0; }
        .table thead th { border-color: rgba(255,255,255,0.1); }
        .table tbody td { border-color: rgba(255,255,255,0.07); }
        .form-control, .form-select { background: #23263a; border-color: rgba(255,255,255,0.15); color: #e0e0e0; }
        .form-control:focus, .form-select:focus { background: #23263a; border-color: #7c6ff7; color: #fff; box-shadow: 0 0 0 3px rgba(124,111,247,0.2); }
        .btn-primary { background: #7c6ff7; border-color: #7c6ff7; }
        .btn-primary:hover { background: #6a5de8; border-color: #6a5de8; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark-custom px-3 mb-4">
    <a class="navbar-brand" th:href="@{/dashboard}">
        <i class="bi bi-bank me-2"></i>FinPlanPro
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-center gap-1">
            <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-shield-lock me-1"></i>Admin Panel</a>
            </li>
            <li class="nav-item">
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="nav-link btn btn-link text-danger p-0"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
                </form>
            </li>
        </ul>
    </div>
</nav>
<main class="container pb-5">
    <div th:replace="${content}"></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
