<!DOCTYPE html>
<html th:fragment="layout(title, content)" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:replace="${title}">FinPlanPro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; min-height: 100vh; background: #0f1117; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .auth-card-modern { display: flex; width: 860px; max-width: 98vw; min-height: 520px; border-radius: 20px; overflow: hidden; box-shadow: 0 24px 64px rgba(0,0,0,0.5); }
        .auth-image-side { flex: 0 0 340px; background: linear-gradient(135deg, #7c6ff7 0%, #5e9de8 50%, #4ab8c7 100%); position: relative; display: flex; flex-direction: column; justify-content: space-between; padding: 2rem; }
        .auth-image-side h3, .auth-image-side h2 { color: #fff; }
        .auth-form-side { flex: 1; background: #1a1d27; padding: 2.5rem 2.5rem; display: flex; flex-direction: column; justify-content: center; }
        .auth-title { color: #fff; font-size: 1.9rem; font-weight: 700; margin-bottom: 0.3rem; }
        .auth-subtitle { color: #aaa; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .auth-link { color: #7c6ff7; text-decoration: none; }
        .auth-link:hover { color: #9d94fa; text-decoration: underline; }
        .auth-input { width: 100%; padding: 0.75rem 1rem; background: #23263a; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: #fff; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        .auth-input:focus { border-color: #7c6ff7; box-shadow: 0 0 0 3px rgba(124,111,247,0.2); }
        .auth-input::placeholder { color: #666; }
        .auth-btn { width: 100%; padding: 0.75rem; background: linear-gradient(90deg, #7c6ff7, #5e9de8); border: none; border-radius: 10px; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .auth-btn:hover { opacity: 0.9; }
        .form-check-input-custom { border-color: rgba(255,255,255,0.3); background-color: transparent; }
        .form-check-label { color: #aaa; font-size: 0.88rem; }
        @media (max-width: 640px) { .auth-card-modern { flex-direction: column; } .auth-image-side { flex: 0 0 auto; min-height: 120px; } }
    </style>
</head>
<body>
    <div th:replace="${content}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
