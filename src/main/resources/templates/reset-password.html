<!DOCTYPE html>
<html lang="th" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{public-layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Reset Password — FinPlanPro</title>
</head>
<body>
<main role="main">
    <div class="auth-card card shadow-lg p-4 p-md-5">
        <div class="card-body">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill" style="font-size:2.5rem; color:#6366f1;"></i>
                <h2 class="fw-bold mt-2">ตั้งรหัสผ่านใหม่</h2>
                <p class="text-muted">กรอกรหัสผ่านใหม่ที่ต้องการ</p>
            </div>

            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form th:action="@{/reset-password}" method="post">
                <input type="hidden" name="token" th:value="${token}">

                <div class="mb-3">
                    <label for="newPassword" class="form-label">รหัสผ่านใหม่</label>
                    <div style="position:relative;">
                        <input type="password" class="form-control form-control-lg" id="newPassword"
                               name="newPassword" required placeholder="กรอกรหัสผ่านใหม่"
                               style="padding-right:3rem;">
                        <button type="button" onclick="togglePw('newPassword','eye1')"
                                style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                                       background:none;border:none;cursor:pointer;color:#94a3b8;">
                            <i class="bi bi-eye" id="eye1"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label">ยืนยันรหัสผ่าน</label>
                    <div style="position:relative;">
                        <input type="password" class="form-control form-control-lg" id="confirmPassword"
                               name="confirmPassword" required placeholder="กรอกรหัสผ่านอีกครั้ง"
                               style="padding-right:3rem;">
                        <button type="button" onclick="togglePw('confirmPassword','eye2')"
                                style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                                       background:none;border:none;cursor:pointer;color:#94a3b8;">
                            <i class="bi bi-eye" id="eye2"></i>
                        </button>
                    </div>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-check-circle me-2"></i>บันทึกรหัสผ่านใหม่
                    </button>
                </div>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/login}" class="text-decoration-none text-muted" style="font-size:0.875rem;">
                    <i class="bi bi-arrow-left me-1"></i>กลับไปหน้า Login
                </a>
            </div>
        </div>
    </div>

    <script>
        function togglePw(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
    </script>
</main>
</body>
</html>
