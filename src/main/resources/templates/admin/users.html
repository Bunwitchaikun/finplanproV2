<!DOCTYPE html>
<html lang="th" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head><title>Manage Users — FinPlanPro</title></head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 style="color:#fff;font-weight:700;margin:0;"><i class="bi bi-people me-2" style="color:#7c6ff7;"></i>Manage Users</h4>
            <p style="color:#aaa;margin:0;font-size:0.88rem;">View and manage all registered users</p>
        </div>
        <a th:href="@{/admin/dashboard}" class="btn btn-sm" style="background:rgba(255,255,255,0.06);color:#aaa;border-radius:8px;border:1px solid rgba(255,255,255,0.1);">
            <i class="bi bi-arrow-left me-1"></i>Admin Dashboard
        </a>
    </div>

    <div th:if="${successMsg}" class="alert py-2 mb-3"
         style="background:rgba(25,135,84,0.15);border:1px solid rgba(25,135,84,0.3);color:#6f6;border-radius:8px;">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
    </div>
    <div th:if="${errorMsg}" class="alert py-2 mb-3"
         style="background:rgba(220,53,69,0.15);border:1px solid rgba(220,53,69,0.3);color:#f88;border-radius:8px;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
    </div>

    <div class="card" style="border-radius:14px;overflow:hidden;">
        <div class="table-responsive">
            <table class="table table-hover mb-0" style="color:#e0e0e0;">
                <thead style="background:rgba(255,255,255,0.05);">
                    <tr>
                        <th style="border-color:rgba(255,255,255,0.1);padding:1rem;">ID</th>
                        <th style="border-color:rgba(255,255,255,0.1);">Username</th>
                        <th style="border-color:rgba(255,255,255,0.1);">Email</th>
                        <th style="border-color:rgba(255,255,255,0.1);">Role</th>
                        <th style="border-color:rgba(255,255,255,0.1);">Change Role</th>
                        <th style="border-color:rgba(255,255,255,0.1);">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}" style="border-color:rgba(255,255,255,0.05);">
                        <td style="border-color:rgba(255,255,255,0.05);padding:0.85rem 1rem;" th:text="${u.id}"></td>
                        <td style="border-color:rgba(255,255,255,0.05);" th:text="${u.username}"></td>
                        <td style="border-color:rgba(255,255,255,0.05);" th:text="${u.email}"></td>
                        <td style="border-color:rgba(255,255,255,0.05);">
                            <span th:each="r : ${u.roles}"
                                  th:text="${r.role.name}"
                                  style="background:rgba(124,111,247,0.2);color:#c5beff;padding:2px 10px;border-radius:20px;font-size:0.8rem;font-weight:500;"></span>
                        </td>
                        <td style="border-color:rgba(255,255,255,0.05);">
                            <form th:action="@{/admin/users/{id}/role(id=${u.id})}" method="post" class="d-flex gap-2 align-items-center">
                                <select name="roleName" class="form-select form-select-sm"
                                        style="background:#23263a;border-color:rgba(255,255,255,0.15);color:#e0e0e0;border-radius:8px;width:auto;">
                                    <th:block th:each="r : ${u.roles}" th:with="current=${r.role.name}">
                                        <option value="ROLE_USER"  th:selected="${current == 'ROLE_USER'}">👤 User</option>
                                        <option value="ROLE_ADMIN" th:selected="${current == 'ROLE_ADMIN'}">🛡 Admin</option>
                                        <option value="ROLE_CEO"   th:selected="${current == 'ROLE_CEO'}">💼 CEO</option>
                                        <option value="ROLE_OWNER" th:selected="${current == 'ROLE_OWNER'}" sec:authorize="hasRole('OWNER')">👑 Owner</option>
                                    </th:block>
                                </select>
                                <button type="submit" class="btn btn-sm" style="background:#7c6ff7;color:#fff;border-radius:8px;">Save</button>
                            </form>
                        </td>
                        <td style="border-color:rgba(255,255,255,0.05);">
                            <a th:href="@{/admin/users/{id}/edit(id=${u.id})}" class="btn btn-sm"
                               style="background:rgba(94,158,232,0.2);color:#a8caef;border-radius:8px;">
                                <i class="bi bi-pencil"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
