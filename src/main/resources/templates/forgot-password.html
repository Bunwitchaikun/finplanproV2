<!DOCTYPE html>
<html lang="th" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{public-layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Forgot Password — FinPlanPro</title>
</head>
<body>
<main role="main">
    <div class="auth-card card shadow-lg p-4 p-md-5">
        <div class="card-body">
            <div class="text-center mb-4">
                <i class="bi bi-lock-fill" style="font-size:2.5rem; color:#6366f1;"></i>
                <h2 class="fw-bold mt-2">ลืมรหัสผ่าน?</h2>
                <p class="text-muted">กรอก email ที่ใช้สมัครสมาชิก ระบบจะส่งลิงก์รีเซ็ตรหัสผ่านให้</p>
            </div>

            <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form th:action="@{/forgot-password}" method="post">
                <div class="mb-4">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control form-control-lg" id="email" name="email"
                           required autofocus placeholder="your@email.com">
                </div>
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-send me-2"></i>ส่งลิงก์รีเซ็ตรหัสผ่าน
                    </button>
                </div>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/login}" class="text-decoration-none text-muted" style="font-size:0.875rem;">
                    <i class="bi bi-arrow-left me-1"></i>กลับไปหน้า Login
                </a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
